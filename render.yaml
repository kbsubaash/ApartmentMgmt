services:
  - type: web
    name: apartment-mgmt-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: postgresql://postgres:password@host:5432/apartment_mgmt
      - key: JWT_ACCESS_SECRET
        value: your-jwt-access-secret-here
      - key: JWT_REFRESH_SECRET
        value: your-jwt-refresh-secret-here
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        value: your-email@gmail.com
      - key: MAIL_PASS
        value: your-app-password
      - key: MAIL_FROM
        value: no-reply@dabc-euphorbia.com
      - key: CLIENT_ORIGIN
        value: https://apartment-mgmt-frontend.onrender.com
      - key: SENTRY_DSN
        value: ""
    autoDeploy: true

  - type: web
    name: apartment-mgmt-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_URL
        value: https://apartment-mgmt-backend.onrender.com/api
    autoDeploy: true
